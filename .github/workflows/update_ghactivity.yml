name: GitHub Recent Activity

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    name: Update README with recent public activity
    steps:
      - uses: actions/checkout@v7
      - uses: jamesgeorge007/github-activity-readme@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GH_USERNAME: sagat79
          COMMIT_MSG: 'chore: update recent activity'
          MAX_LINES: 5
