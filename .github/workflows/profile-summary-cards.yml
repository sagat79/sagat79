name: Profile Summary Cards

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cards:
    runs-on: ubuntu-latest
    name: Generate profile summary cards
    steps:
      - uses: actions/checkout@v7
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: sagat79
          BRANCH_NAME: main
          UTC_OFFSET: 3
